name: Build and Deploy Spring Boot to Azure

on:
  push:
    branches:
      - main  # Triggers the workflow when changes are pushed to the main branch
    paths:
      - 'backend/**'  # Triggers only when code in the backend directory changes
      - '.github/workflows/azure-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'coaching-backend' # REPLACE this with your actual Azure Web App name if it differs
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'backend/target/backend-0.0.1-SNAPSHOT.jar'
